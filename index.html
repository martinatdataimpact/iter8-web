<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iter8</title>
  <meta name="description" content="iter8 — coming soon.">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JF92SKXM2K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JF92SKXM2K');
  </script>
</head>
<body>
  <!-- Animated SVG background -->
  <div class="svg-container">
    <svg viewBox="0 0 100 100" preserveAspectRatio="none">
      <path id="fluid" fill="#f4f5f8" d="" />
      <path id="fluid-2" fill="#eff1f5" d="" />
    </svg>
  </div>

  <main class="center-content">
    <!-- Orbital accents at bottom -->
    <div class="orbits" aria-hidden="true">
      <svg viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
        <ellipse class="orbit orbit-1" cx="300" cy="100" rx="280" ry="70" stroke="#14171a" stroke-width="0.5" fill="none" opacity="0.12"/>
        <ellipse class="orbit orbit-2" cx="300" cy="100" rx="240" ry="55" stroke="#14171a" stroke-width="0.5" fill="none" opacity="0.08" transform="rotate(8 300 100)"/>
        <ellipse class="orbit orbit-3" cx="300" cy="100" rx="200" ry="40" stroke="#14171a" stroke-width="0.5" fill="none" opacity="0.06" transform="rotate(-5 300 100)"/>
      </svg>
    </div>

    <!-- Growing flower -->
    <div class="flower-wrap" aria-hidden="true">
      <svg class="flower-svg" viewBox="0 0 100 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Curved stem -->
        <path class="stem" d="M50 200 C50 170, 48 140, 49 120 C50 100, 52 85, 51 70" stroke="#4a7c59" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <!-- Left leaf -->
        <path class="leaf leaf-l" d="M49 145 C40 135, 25 132, 24 140 C23 148, 35 152, 49 145Z" fill="#5a9e6f"/>
        <!-- Right leaf (higher, smaller) -->
        <path class="leaf leaf-r" d="M50 118 C58 108, 70 107, 72 114 C74 121, 62 123, 50 118Z" fill="#6aae7f"/>
        <!-- Small bud leaf near top -->
        <path class="leaf leaf-t" d="M51 90 C44 84, 38 86, 40 92 C42 96, 48 94, 51 90Z" fill="#5a9e6f"/>
        <!-- Petals — varied sizes and irregular angles -->
        <g class="petals" transform="translate(51,58)">
          <ellipse class="petal p1" cx="0" cy="-17" rx="7"  ry="15" fill="#e8a0b4" transform="rotate(-5)"/>
          <ellipse class="petal p2" cx="1" cy="-19" rx="5"  ry="17" fill="#dba0c7" transform="rotate(40)"/>
          <ellipse class="petal p3" cx="-1" cy="-16" rx="7.5" ry="14" fill="#eaa8b8" transform="rotate(82)"/>
          <ellipse class="petal p4" cx="0" cy="-18" rx="5.5" ry="16" fill="#d9a0c5" transform="rotate(130)"/>
          <ellipse class="petal p5" cx="1" cy="-17" rx="6.5" ry="15" fill="#e8a0b4" transform="rotate(175)"/>
          <ellipse class="petal p6" cx="-1" cy="-19" rx="5"  ry="17" fill="#dba0c7" transform="rotate(222)"/>
          <ellipse class="petal p7" cx="0" cy="-16" rx="7"  ry="14" fill="#eaa8b8" transform="rotate(268)"/>
          <ellipse class="petal p8" cx="1" cy="-18" rx="6"  ry="16" fill="#d9a0c5" transform="rotate(318)"/>
          <!-- Center -->
          <circle class="flower-center" cx="0.5" cy="-0.5" r="5.5" fill="#f0c75e"/>
        </g>
      </svg>
    </div>

    <div class="logo">iter8</div>
    <h1 class="message">coming soon...</h1>
    <a href="mailto:info@iter8.se" class="contact-link">info@iter8.se</a>
  </main>

  <script src="./main.js"></script>
</body>
</html>
