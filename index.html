<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iter8</title>
  <meta name="description" content="iter8 — coming soon.">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JF92SKXM2K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JF92SKXM2K');
  </script>
</head>
<body>
  <!-- Animated SVG background -->
  <div class="svg-container">
    <svg viewBox="0 0 100 100" preserveAspectRatio="none">
      <path id="fluid" fill="#f4f5f8" d="" />
      <path id="fluid-2" fill="#eff1f5" d="" />
    </svg>
  </div>

  <main class="center-content">
    <!-- Orbital accents at bottom -->
    <div class="orbits" aria-hidden="true">
      <svg viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
        <ellipse class="orbit orbit-1" cx="300" cy="100" rx="280" ry="70" stroke="#14171a" stroke-width="0.5" fill="none" opacity="0.12"/>
        <ellipse class="orbit orbit-2" cx="300" cy="100" rx="240" ry="55" stroke="#14171a" stroke-width="0.5" fill="none" opacity="0.08" transform="rotate(8 300 100)"/>
        <ellipse class="orbit orbit-3" cx="300" cy="100" rx="200" ry="40" stroke="#14171a" stroke-width="0.5" fill="none" opacity="0.06" transform="rotate(-5 300 100)"/>
      </svg>
    </div>

    <!-- Growing flower -->
    <div class="flower-wrap" aria-hidden="true">
      <svg class="flower-svg" viewBox="0 0 100 180" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Stem -->
        <line class="stem" x1="50" y1="180" x2="50" y2="75" stroke="#4a7c59" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Left leaf -->
        <path class="leaf leaf-l" d="M50 130 C38 120, 28 125, 30 135 C32 140, 42 138, 50 130Z" fill="#5a9e6f"/>
        <!-- Right leaf -->
        <path class="leaf leaf-r" d="M50 110 C62 100, 72 105, 70 115 C68 120, 58 118, 50 110Z" fill="#5a9e6f"/>
        <!-- Petals -->
        <g class="petals" transform="translate(50,55)">
          <ellipse class="petal p1" cx="0" cy="-18" rx="6" ry="16" fill="#e8a0b4" transform="rotate(0)"/>
          <ellipse class="petal p2" cx="0" cy="-18" rx="6" ry="16" fill="#dba0c7" transform="rotate(45)"/>
          <ellipse class="petal p3" cx="0" cy="-18" rx="6" ry="16" fill="#e8a0b4" transform="rotate(90)"/>
          <ellipse class="petal p4" cx="0" cy="-18" rx="6" ry="16" fill="#dba0c7" transform="rotate(135)"/>
          <ellipse class="petal p5" cx="0" cy="-18" rx="6" ry="16" fill="#e8a0b4" transform="rotate(180)"/>
          <ellipse class="petal p6" cx="0" cy="-18" rx="6" ry="16" fill="#dba0c7" transform="rotate(225)"/>
          <ellipse class="petal p7" cx="0" cy="-18" rx="6" ry="16" fill="#e8a0b4" transform="rotate(270)"/>
          <ellipse class="petal p8" cx="0" cy="-18" rx="6" ry="16" fill="#dba0c7" transform="rotate(315)"/>
          <!-- Center -->
          <circle class="flower-center" r="5" fill="#f0c75e"/>
        </g>
      </svg>
    </div>

    <div class="logo">iter8</div>
    <h1 class="message">coming soon...</h1>
    <a href="mailto:info@iter8.se" class="contact-link">info@iter8.se</a>
  </main>

  <script src="./main.js"></script>
</body>
</html>
